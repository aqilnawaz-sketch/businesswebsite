<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>MLA Litigation Desk — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#140c06;color:#e8dfc8;font-family:'Cormorant Garamond',Georgia,serif;display:flex;align-items:center;justify-content:center}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.card{width:100%;max-width:380px;margin:20px;background:#111116;border:1px solid rgba(201,164,68,.2);padding:40px 36px;animation:fu .4s ease both}
.logo-wrap{text-align:center;margin-bottom:28px}
.logo-wrap img{width:72px;height:72px;border-radius:50%;border:1px solid rgba(201,164,68,.25)}
.logo-wrap .firm{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:#c9a444;margin-top:10px}
.logo-wrap .sub{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:#8a8070;margin-top:4px}
label{display:block;font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.14em;text-transform:uppercase;color:#8a8070;margin-bottom:6px}
input[type=password]{width:100%;background:#0b0703;border:1px solid rgba(201,164,68,.2);color:#e8dfc8;font-family:'Cormorant Garamond',Georgia,serif;font-size:1.05rem;padding:11px 14px;outline:none;transition:border-color .18s}
input[type=password]:focus{border-color:rgba(201,164,68,.5)}
button{width:100%;margin-top:18px;background:transparent;border:1px solid rgba(201,164,68,.4);color:#c9a444;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;padding:13px;cursor:pointer;transition:background .18s,border-color .18s}
button:hover{background:rgba(201,164,68,.08);border-color:#c9a444}
.err{color:#d45f5f;font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;margin-top:12px;text-align:center;min-height:1.2em}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img id="llgImg" alt="MLA">
    <div class="firm">Mian Law Associates</div>
    <div class="sub">Litigation Desk</div>
  </div>
  <label for="pw">Access Code</label>
  <input type="password" id="pw" placeholder="••••••••" autofocus>
  <button onclick="login()">Enter</button>
  <div class="err" id="err"></div>
</div>

<script src="data.js"></script>
<script src="shared.js"></script>
<script>
// Set logo once shared.js has defined LLG
document.getElementById('llgImg').src = LLG;

// Redirect if already authed
if (localStorage.getItem('mla_auth') === '1') location.replace('dashboard.html');

document.getElementById('pw').addEventListener('keydown', function(e){
  if (e.key === 'Enter') login();
});

function login() {
  var pw = document.getElementById('pw').value;
  if (pw.toUpperCase() === 'MLA1997') {
    localStorage.setItem('mla_auth', '1');
    location.replace('dashboard.html');
  } else {
    document.getElementById('err').textContent = 'Invalid access code';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}
</script>
</body>
</html>
