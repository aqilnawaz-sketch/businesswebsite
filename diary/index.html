<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>MLA Litigation Desk</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden;background:#140c06;color:#e8dfc8;font-family:"Cormorant Garamond",Georgia,serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(201,164,68,.25);border-radius:2px}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.anim{animation:fu .35s ease both}.ain{animation:fi .28s ease both}
.ni{transition:all .18s;cursor:pointer;border-left:2px solid transparent}
.ni:hover{background:rgba(201,164,68,.07)!important}
.ni.on{background:rgba(201,164,68,.13)!important;border-left-color:#c9a444!important;color:#c9a444!important}
.rh{cursor:pointer}.rh:hover{background:rgba(255,255,255,.025)!important}
.ch:hover{border-color:rgba(201,164,68,.4)!important}
.gh:hover{border-color:#c9a444!important;color:#c9a444!important}
input,select,textarea{outline:none;font-family:"Cormorant Garamond",Georgia,serif}
input:focus,textarea:focus,select:focus{border-color:rgba(201,164,68,.5)!important}
button{cursor:pointer}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.ga{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px}
@media(max-width:768px){.g2{grid-template-columns:1fr}.g4{grid-template-columns:1fr 1fr}.ga{grid-template-columns:1fr 1fr}.mob-show{display:flex!important}.desk-hide{display:none!important}}
</style>
</head>

const bg='#140c06',bg2='#111116',bg3='#161620';

/* UTILS */
const R=n=>n!=null?`₨ ${Number(n).toLocaleString('en-PK')}`:'₨ 0';
const D=s=>s?new Date(s).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—';
const dd=s=>Math.ceil((new Date(s)-new Date())/86400000);
const stageC=s=>({Arguments:gold,'Final Arguments':gold,'Bail Hearing':red,Evidence:blue,Trial:blue}[s]||muted);
const priC=p=>({urgent:red,high:yellow,normal:blue}[p]||muted);
const riskC=r=>({green,yellow,red}[r]||muted);
const riskL=r=>({green:'Reliable Payer',yellow:'Slow Payer',red:'Problematic Payer'}[r]||'—');
const todayStr=()=>new Date().toISOString().slice(0,10);
const tomStr=()=>{const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);};

/* ── WHATSAPP via CallMeBot ── */
const WA_NUM='923333621111';

const getWaKey=()=>{ try{return localStorage.getItem('mla_wakey')||'';}catch(e){return '';} };
const setWaKey=k=>{ try{localStorage.setItem('mla_wakey',k);}catch(e){} };

const buildWaMsg=cases=>{
  const tH=cases.filter(c=>dd(c.next)===0);
  const tmH=cases.filter(c=>dd(c.next)===1);
  const soon=cases.filter(c=>dd(c.next)>1&&dd(c.next)<=3);
  const unp=cases.filter(c=>c.received<c.agreed&&(c.agreed-c.received)>50000).slice(0,3);
  let m='*MLA Litigation Desk*\n';
  m+='Adv. Mian Aqil Nawaz | Bahawalpur\n';
  m+=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})+'\n\n';
  if(tH.length>0){
    m+='*TODAY HEARINGS ('+tH.length+')*\n';
    tH.forEach((h,i)=>{ m+=(i+1)+'. '+h.title+'\n   '+h.court.replace('Bahawalpur','BWP')+' — '+h.stage+'\n'; });
    m+='\n';
  }
  if(tmH.length>0){
    m+='*TOMORROW ('+tmH.length+')*\n';
    tmH.forEach((h,i)=>{ m+=(i+1)+'. '+h.title+'\n   '+D(h.next)+' | '+h.stage+'\n'; });
    m+='\n';
  }
  if(soon.length>0){
    m+='*COMING SOON*\n';
    soon.forEach(h=>{ m+='• '+h.title+' — '+D(h.next)+'\n'; });
    m+='\n';
  }
  if(tH.length===0&&tmH.length===0&&soon.length===0){
    m+='*No hearings in next 3 days.*\n\n';
  }
  if(unp.length>0){
    m+='*FEE ALERTS*\n';
    unp.forEach(h=>{
      const p=h.agreed-h.received;
      m+='• '+h.client+' — '+R(p)+' pending\n';
    });
    m+='\n';
  }
  m+='_mlabwp.com.pk_';
  return m;
};

const sendWA=(msg,key)=>{
  const k=key||getWaKey();
  if(!k){return false;}
  const img=new Image();
  img.src='https://api.callmebot.com/whatsapp.php?phone='+WA_NUM+'&text='+encodeURIComponent(msg)+'&apikey='+k;
  return true;
};

const triggerWA=cases=>{
  const k=getWaKey();
  if(!k){
    const entered=window.prompt(
      'WHATSAPP SETUP\n\n'+
      'Step 1: Open WhatsApp on your phone\n'+
      'Step 2: Add contact: +34 644 82 47 47\n'+
      'Step 3: Send this exact message to that contact:\n'+
      '   I allow callmebot to send me messages\n'+
      'Step 4: You will receive your API Key by WhatsApp\n'+
      'Step 5: Enter that API Key below:\n\n'+
      'Enter CallMeBot API Key:'
    );
    if(!entered||!entered.trim()){return;}
    setWaKey(entered.trim());
    const msg=buildWaMsg(cases);
    const ok=sendWA(msg,entered.trim());
    if(ok) setTimeout(()=>alert('WhatsApp reminder sent to 0333-3621111!'),1500);
    return;
  }
  const msg=buildWaMsg(cases);
  sendWA(msg,k);
  setTimeout(()=>alert('WhatsApp reminder sent to 0333-3621111!'),1500);
};

const autoWaReminder=cases=>{
  const k=getWaKey();
  if(!k) return;
  try{
    const last=localStorage.getItem('mla_wa_last');
    const today=todayStr();
    if(last===today) return;
    const tH=cases.filter(c=>dd(c.next)===0);
    const tmH=cases.filter(c=>dd(c.next)===1);
    if(tH.length>0||tmH.length>0){
      localStorage.setItem('mla_wa_last',today);
      setTimeout(()=>sendWA(buildWaMsg(cases),k),4000);
    }
  }catch(e){}
};

const resetWaKey=()=>{
  if(window.confirm('Reset WhatsApp API Key? You will need to enter it again.')){
    try{localStorage.removeItem('mla_wakey');localStorage.removeItem('mla_wa_last');}catch(e){}
    alert('WhatsApp key cleared. Click Send WhatsApp to set up again.');
  }
};

const sendReminderEmail=cases=>{

const notifyHearings=cases=>{
  if(!('Notification' in window)){alert('Browser notifications not supported on this device.');return;}
  Notification.requestPermission().then(p=>{
    if(p==='granted'){
      const tH=cases.filter(h=>dd(h.next)===0);
      const tmH=cases.filter(h=>dd(h.next)===1);
      if(tH.length>0){tH.forEach(h=>new Notification('Hearing TODAY — MLA Desk',{body:h.title+'\n'+h.court,tag:h.id}));}
      else if(tmH.length>0){new Notification('Hearing Tomorrow — MLA Desk',{body:tmH[0].title+'\n'+tmH[0].court,tag:'tom'});}
      else{new Notification('MLA Litigation Desk',{body:'No hearings today or tomorrow.',tag:'clear'});}
      alert('Browser notifications enabled! You will now see alerts for upcoming hearings.');
    } else {
      alert('Notification permission denied. Please allow notifications in your browser/phone settings.');
    }
  });
};

}

/* ── CASES LIST ── */
function CasesList({cases,onNav,setDetail}){
  const [q,setQ]=useState('');
  const [filt,setFilt]=useState('all');
  const rows=useMemo(()=>cases.filter(c=>{
    const m=q.toLowerCase();
    if(q&&!`${c.title} ${c.client} ${c.no} ${c.cnic} ${c.fir} ${c.mobile}`.toLowerCase().includes(m))return false;
    if(filt!=='all'&&c.cat.toLowerCase()!==filt)return false;
    return true;
  }),[cases,q,filt]);
  const cats=[...new Set(cases.map(c=>c.cat))];
  return <div className="ain" style={{padding:'24px 28px'}}>
    <EW ch="Chamber Records"/>
    <h1 style={{fontFamily:CIN,fontSize:'1.4rem',color:cream,letterSpacing:'0.06em',marginBottom:18}}>Case Management</h1>
    <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search by client, CNIC, FIR No., case no., mobile…"
        style={{flex:1,minWidth:180,background:bg2,border:`1px solid ${bdr}`,color:cream,padding:'10px 14px',fontSize:'0.87rem'}}/>
      <select value={filt} onChange={e=>setFilt(e.target.value)} style={{background:bg2,border:`1px solid ${bdr}`,color:muted,padding:'10px 13px',fontSize:'0.8rem'}}>
        <option value="all">All Categories</option>
        {cats.map(c=><option key={c} value={c.toLowerCase()}>{c}</option>)}
      </select>
    </div>
    <div style={{background:bg2,border:`1px solid ${bdr}`,overflowX:'auto'}}>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1.5fr 1fr 1fr 1fr 80px',padding:'8px 16px',borderBottom:`1px solid ${bdr}`,minWidth:600}}>
        {['Case Title','Court','Category','Stage','Next Hearing','Fee %'].map(h=><div key={h} style={{fontFamily:CIN,fontSize:'0.49rem',letterSpacing:'0.14em',textTransform:'uppercase',color:muted}}>{h}</div>)}
      </div>
      {rows.length===0&&<div style={{padding:'24px',textAlign:'center',color:muted,fontSize:'0.86rem'}}>No cases found</div>}
      {rows.map(c=>{
        const pct=c.agreed>0?Math.round(c.received/c.agreed*100):0;
        return <div key={c.id} className="rh" style={{display:'grid',gridTemplateColumns:'2fr 1.5fr 1fr 1fr 1fr 80px',padding:'12px 16px',borderBottom:'1px solid rgba(201,164,68,0.07)',alignItems:'center',minWidth:600,cursor:'pointer'}}
          onClick={()=>{setDetail(c);onNav('case-detail');}}>
          <div><div style={{fontFamily:CIN,fontSize:'0.61rem',color:cream,marginBottom:2}}>{c.title}</div><div style={{fontSize:'0.68rem',color:muted}}>{c.client} · {c.no}</div></div>
          <div style={{fontSize:'0.71rem',color:muted,paddingRight:6}}>{c.court.length>32?c.court.slice(0,32)+'…':c.court}</div>
          <div><Badge col={blue} small ch={c.cat}/></div>
          <div><Badge col={stageC(c.stage)} small ch={c.stage}/></div>
          <div>
            <div style={{fontSize:'0.74rem',color:dd(c.next)<=3?red:cream}}>{D(c.next)}</div>
            <div style={{fontSize:'0.62rem',color:dd(c.next)<=3?red:muted}}>{dd(c.next)>0?`in ${dd(c.next)}d`:'Past'}</div>
          </div>
          <div>
            <div style={{fontSize:'0.7rem',color:pct>=100?green:pct>=60?yellow:red,fontFamily:CIN}}>{pct}%</div>
            <div style={{height:3,background:'rgba(255,255,255,0.07)',marginTop:4,borderRadius:2}}><div style={{height:3,width:`${Math.min(pct,100)}%`,background:pct>=100?green:pct>=60?yellow:red,borderRadius:2}}/></div>
          </div>
        </div>;
      })}
    </div>
  </div>;
}

/* ── CASE DETAIL ── */

            <div style={{height:4,background:'rgba(255,255,255,0.08)',borderRadius:2}}><div style={{height:4,width:`${Math.min(pct,100)}%`,background:pct>=100?green:pct>=60?yellow:red,borderRadius:2}}/></div>

/* ── DIARY ── */
function DiaryView({cases}){
  const [m,setM]=useState(new Date().getMonth());
  const [y,setY]=useState(new Date().getFullYear());
  const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const first=new Date(y,m,1).getDay(),total=new Date(y,m+1,0).getDate();
  const days=[...Array(first).fill(null),...Array.from({length:total},(_,i)=>i+1)];
  const hMap={};
  cases.forEach(c=>{const d=new Date(c.next);if(d.getMonth()===m&&d.getFullYear()===y){const k=d.getDate();if(!hMap[k])hMap[k]=[];hMap[k].push(c);}});
  const now=new Date(),isNow=m===now.getMonth()&&y===now.getFullYear();
  const mC=cases.filter(c=>{const d=new Date(c.next);return d.getMonth()===m&&d.getFullYear()===y;}).sort((a,b)=>new Date(a.next)-new Date(b.next));
  return <div className="ain" style={{padding:'24px 28px'}}>
    <EW ch="Hearing Schedule"/>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18,flexWrap:'wrap',gap:10}}>
      <h1 style={{fontFamily:CIN,fontSize:'1.4rem',color:cream,letterSpacing:'0.06em'}}>Court Diary</h1>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <button className="gh" onClick={()=>m===0?setM(11)||setY(y-1):setM(m-1)} style={{background:bg2,border:`1px solid ${bdr}`,color:muted,padding:'7px 13px',fontFamily:CIN,fontSize:'0.57rem'}}>‹ Prev</button>
        <span style={{fontFamily:CIN,fontSize:'0.77rem',color:cream,letterSpacing:'0.08em',minWidth:130,textAlign:'center'}}>{MN[m]} {y}</span>
        <button className="gh" onClick={()=>m===11?setM(0)||setY(y+1):setM(m+1)} style={{background:bg2,border:`1px solid ${bdr}`,color:muted,padding:'7px 13px',fontFamily:CIN,fontSize:'0.57rem'}}>Next ›</button>
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:1,marginBottom:1}}>
      {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=><div key={d} style={{textAlign:'center',padding:'6px 0',fontFamily:CIN,fontSize:'0.49rem',letterSpacing:'0.14em',textTransform:'uppercase',color:muted}}>{d}</div>)}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:1}}>
      {days.map((d,i)=>{
        const h=d?hMap[d]||[]:[];const isT=isNow&&d===now.getDate();
        return <div key={i} style={{minHeight:76,background:d?(isT?'rgba(201,164,68,0.1)':bg2):'rgba(0,0,0,0.18)',border:`1px solid ${isT?gold:bdr}`,padding:'6px 7px'}}>
          {d&&<div style={{fontFamily:CIN,fontSize:'0.66rem',color:isT?gold:h.length>0?cream:muted,marginBottom:3}}>{d}</div>}
          {h.map((c,j)=><div key={j} style={{fontSize:'0.53rem',background:`${stageC(c.stage)}20`,border:`1px solid ${stageC(c.stage)}40`,color:stageC(c.stage),padding:'2px 4px',marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:CIN}}>{c.client.split(' ')[0]}</div>)}
        </div>;
      })}
    </div>
    <div style={{display:'flex',gap:14,marginTop:12,flexWrap:'wrap'}}>
      {[['Arguments',gold],['Bail/Trial',red],['Evidence',blue],['Completed',green]].map(([l,c])=><div key={l} style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:8,height:8,background:`${c}28`,border:`1px solid ${c}55`}}/><span style={{fontFamily:CIN,fontSize:'0.49rem',letterSpacing:'0.12em',textTransform:'uppercase',color:muted}}>{l}</span></div>)}
    </div>
    {mC.length>0&&<><GR/><Lbl c={cream} mb={12} ch={`Hearings This Month (${mC.length})`}/><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(250px,1fr))',gap:10}}>{mC.map(c=><div key={c.id} className="ch" style={{background:bg2,border:`1px solid ${bdr}`,padding:'12px 16px',transition:'border-color .2s'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7}}><Badge col={stageC(c.stage)} small ch={c.stage}/><div style={{fontFamily:CIN,fontSize:'0.65rem',color:gold}}>{D(c.next)}</div></div><div style={{fontFamily:CIN,fontSize:'0.63rem',color:cream,marginBottom:2}}>{c.title}</div><div style={{fontSize:'0.71rem',color:muted}}>{c.court}</div></div>)}</div></>}
  </div>;
}

/* ── FINANCE ── */
function FinanceView({cases}){
  const tA=cases.reduce((a,c)=>a+c.agreed,0),tR=cases.reduce((a,c)=>a+c.received,0),tE=cases.reduce((a,c)=>a+c.expense,0);
  const catD=['Criminal','Civil','Commercial'].map(cat=>{const cs=cases.filter(c=>c.cat===cat);return{name:cat,agreed:cs.reduce((a,c)=>a+c.agreed,0),received:cs.reduce((a,c)=>a+c.received,0)};});
  const allP=cases.flatMap(c=>c.payments.map(p=>({...p,client:c.client}))).sort((a,b)=>new Date(b.date)-new Date(a.date));
  return <div className="ain" style={{padding:'24px 28px'}}>
    <EW ch="Fee Recovery"/>
    <h1 style={{fontFamily:CIN,fontSize:'1.4rem',color:cream,letterSpacing:'0.06em',marginBottom:20}}>Financial Dashboard</h1>
    <div className="ga" style={{marginBottom:22}}>
      <Stat label="Total Agreed" val={R(tA)}/><Stat label="Collected" val={R(tR)} col={green}/><Stat label="Outstanding" val={R(tA-tR)} col={tA-tR>0?red:green}/><Stat label="Expenses" val={R(tE)} col={yellow}/><Stat label="Net Profit" val={R(tR-tE)} col={tR-tE>0?green:red}/><Stat label="Collection Rate" val={`${tA>0?Math.round(tR/tA*100):0}%`} col={gold}/>
    </div>
    <div className="g2" style={{marginBottom:22}}>
      <div><Lbl c={cream} mb={10} ch="Category-wise Revenue"/><div style={{background:bg2,border:`1px solid ${bdr}`,padding:'16px',height:185,display:'flex',alignItems:'center',justifyContent:'center'}}><SvgBar data={catD}/></div></div>
      <div><Lbl c={cream} mb={10} ch="Per-Case Recovery"/><div style={{background:bg2,border:`1px solid ${bdr}`}}>{cases.map(c=>{const pct=c.agreed>0?Math.round(c.received/c.agreed*100):0;return(<div key={c.id} style={{padding:'10px 15px',borderBottom:'1px solid rgba(201,164,68,0.07)'}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><div style={{fontFamily:CIN,fontSize:'0.56rem',color:cream,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'62%'}}>{c.client}</div><div style={{fontFamily:CIN,fontSize:'0.57rem',color:pct>=100?green:pct>=60?yellow:red}}>{pct}%</div></div><div style={{height:3,background:'rgba(255,255,255,0.07)',borderRadius:2}}><div style={{height:3,width:`${Math.min(pct,100)}%`,background:pct>=100?green:pct>=60?yellow:red,borderRadius:2}}/></div><div style={{fontSize:'0.66rem',color:muted,marginTop:3}}>Pending: {R(c.agreed-c.received)} · <span style={{color:riskC(c.risk)}}>{riskL(c.risk)}</span></div></div>);})}</div></div>
    </div>
    <Lbl c={cream} mb={10} ch="Recent Payments"/>
    <div style={{background:bg2,border:`1px solid ${bdr}`}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1.4fr 1fr 1fr 2fr',padding:'8px 17px',borderBottom:`1px solid ${bdr}`}}>{['Date','Client','Amount','Method','Remarks'].map(h=><div key={h} style={{fontFamily:CIN,fontSize:'0.48rem',letterSpacing:'0.14em',textTransform:'uppercase',color:muted}}>{h}</div>)}</div>
      {allP.slice(0,10).map((p,i)=><div key={i} style={{display:'grid',gridTemplateColumns:'1fr 1.4fr 1fr 1fr 2fr',padding:'10px 17px',borderBottom:'1px solid rgba(201,164,68,0.06)',alignItems:'center'}}>
        <div style={{fontSize:'0.76rem',color:cream}}>{D(p.date)}</div><div style={{fontSize:'0.76rem',color:cream,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.client}</div><div style={{fontFamily:CIN,fontSize:'0.74rem',color:green}}>{R(p.amt)}</div><Badge col={blue} small ch={p.method}/><div style={{fontSize:'0.74rem',color:muted}}>{p.note}</div>
      </div>)}
    </div>
  </div>;
}

/* ── REMINDERS ── */
function RemindersView({cases}){
  const up=cases.filter(c=>dd(c.next)>=0&&dd(c.next)<=14).sort((a,b)=>new Date(a.next)-new Date(b.next));
  const unp=cases.filter(c=>c.received<c.agreed).sort((a,b)=>(b.agreed-b.received)-(a.agreed-a.received));
  return <div className="ain" style={{padding:'24px 28px'}}>
    <EW ch="Alerts & Notifications"/>

/* ── SEARCH ── */
function SearchView({cases,onNav,setDetail}){
  const [q,setQ]=useState('');
  const res=useMemo(()=>{
    if(!q.trim())return[];
    const m=q.toLowerCase();
    return cases.filter(c=>`${c.title} ${c.client} ${c.no} ${c.cnic} ${c.fir} ${c.mobile} ${c.opponent} ${c.court}`.toLowerCase().includes(m));
  },[q,cases]);
  return <div className="ain" style={{padding:'24px 28px',maxWidth:900}}>
    <EW ch="Global Search"/>
    <h1 style={{fontFamily:CIN,fontSize:'1.4rem',color:cream,letterSpacing:'0.06em',marginBottom:18}}>Search Chamber Records</h1>
    <input value={q} onChange={e=>setQ(e.target.value)} autoFocus placeholder="Search by client name, CNIC, FIR No., case no., mobile, court, opponent…"
      style={{width:'100%',background:bg2,border:`1px solid ${bdr}`,color:cream,padding:'13px 18px',fontSize:'0.93rem',marginBottom:18}}/>
    {q&&<div style={{fontFamily:CIN,fontSize:'0.55rem',letterSpacing:'0.14em',textTransform:'uppercase',color:muted,marginBottom:13}}>{res.length} result{res.length!==1?'s':''} for "{q}"</div>}
    {res.map(c=>(
      <div key={c.id} className="rh ch" style={{background:bg2,border:`1px solid ${bdr}`,padding:'15px 19px',marginBottom:9,transition:'border-color .2s'}} onClick={()=>{setDetail(c);onNav('case-detail');}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8,gap:12}}>
          <div><div style={{fontFamily:CIN,fontSize:'0.72rem',color:cream,letterSpacing:'0.04em',marginBottom:3}}>{c.title}</div><div style={{fontSize:'0.72rem',color:muted}}>{c.no} · {c.client} · {c.mobile}</div></div>
          <div style={{display:'flex',gap:5,flexShrink:0}}><Badge col={stageC(c.stage)} small ch={c.stage}/><Badge col={priC(c.priority)} small ch={c.priority}/></div>
        </div>
        <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
          <div style={{fontSize:'0.71rem',color:muted}}>Court: {c.court}</div>
          <div style={{fontSize:'0.71rem',color:muted}}>Next: {D(c.next)}</div>
          {c.fir&&<div style={{fontSize:'0.71rem',color:muted}}>FIR: {c.fir}</div>}
        </div>
      </div>
    ))}
    {q&&res.length===0&&<div style={{background:bg2,border:`1px solid ${bdr}`,padding:'36px',textAlign:'center',color:muted,fontSize:'0.87rem'}}>No records found for "{q}"</div>}
    {!q&&<div style={{background:'rgba(201,164,68,0.04)',border:`1px solid ${bdr}`,padding:'36px',textAlign:'center',color:muted,fontSize:'0.85rem',lineHeight:1.8}}>Search across all case records — clients, FIR numbers,<br/>CNICs, mobile numbers, courts and opponents</div>}
  </div>;
}


/* ── CLIENT PROFILES ── */
function ClientsView({cases,onNav,setDetail,setPrevView,curView}){
  const [sel,setSel]=useState(null);
  const clients=useMemo(()=>{
    const m={};
    cases.forEach(cs=>{
      const key=cs.cnic||cs.client;
      if(!m[key]){m[key]={name:cs.client,father:cs.father,cnic:cs.cnic,mobile:cs.mobile,address:cs.address,risk:cs.risk,cases:[]};}
      m[key].cases.push(cs);
      if(cs.risk==='red')m[key].risk='red';
      else if(cs.risk==='yellow'&&m[key].risk!=='red')m[key].risk='yellow';
    });
    return Object.values(m).sort((a,b)=>a.name.localeCompare(b.name));
  },[cases]);

  if(sel){
    const cl=clients.find(cl=>cl.cnic===sel||cl.name===sel);
    if(cl) return <ClientProfile cl={cl} onBack={()=>setSel(null)} onNav={onNav} setDetail={setDetail} setPrevView={setPrevView} curView={curView}/>;
  }

  return <div className="ain" style={{padding:'24px 28px'}}>
    <EW ch="Client Registry"/>
    <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:20}}>
      <h1 style={{fontFamily:CIN,fontSize:'1.4rem',color:cream,letterSpacing:'0.06em'}}>Client Profiles</h1>
      <div style={{fontFamily:CIN,fontSize:'0.52rem',letterSpacing:'0.14em',textTransform:'uppercase',color:muted}}>{clients.length} Client{clients.length!==1?'s':''}</div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:14}}>
      {clients.map(cl=>{
        const totA=cl.cases.reduce((a,cs)=>a+cs.agreed,0);
        const totR=cl.cases.reduce((a,cs)=>a+cs.received,0);
        const pct=totA>0?Math.round(totR/totA*100):0;
        const nextH=cl.cases.filter(cs=>dd(cs.next)>=0).sort((a,b)=>new Date(a.next)-new Date(b.next))[0];
        const hasUrgent=cl.cases.some(cs=>cs.priority==='urgent');
        return <div key={cl.cnic||cl.name} className="rh ch" style={{background:bg2,border:`1px solid ${bdr}`,padding:'18px 20px',cursor:'pointer',transition:'border-color .2s'}} onClick={()=>setSel(cl.cnic||cl.name)}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:13}}>
            <div style={{display:'flex',alignItems:'center',gap:11}}>
              <div style={{width:38,height:38,background:'rgba(201,164,68,0.1)',border:`1px solid ${bdr}`,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <span style={{fontFamily:CIN,fontSize:'1rem',color:gold}}>{cl.name.charAt(0)}</span>
              </div>
              <div>
                <div style={{fontFamily:CIN,fontSize:'0.7rem',color:cream,letterSpacing:'0.04em',marginBottom:2}}>{cl.name}</div>
                <div style={{fontSize:'0.69rem',color:muted}}>{cl.cnic}</div>
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
              <Badge col={riskC(cl.risk)} small ch={riskL(cl.risk)}/>
              {hasUrgent&&<Badge col={red} small ch="Urgent"/>}
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:12}}>
            <div style={{background:bg3,padding:'8px 10px'}}>
              <div style={{fontFamily:CIN,fontSize:'0.47rem',letterSpacing:'0.12em',textTransform:'uppercase',color:muted,marginBottom:2}}>Cases</div>
              <div style={{fontFamily:CIN,fontSize:'0.95rem',color:cream}}>{cl.cases.length}</div>
            </div>
            <div style={{background:bg3,padding:'8px 10px'}}>
              <div style={{fontFamily:CIN,fontSize:'0.47rem',letterSpacing:'0.12em',textTransform:'uppercase',color:muted,marginBottom:2}}>Agreed</div>
              <div style={{fontFamily:CIN,fontSize:'0.7rem',color:gold}}>{R(totA)}</div>
            </div>
            <div style={{background:bg3,padding:'8px 10px'}}>
              <div style={{fontFamily:CIN,fontSize:'0.47rem',letterSpacing:'0.12em',textTransform:'uppercase',color:muted,marginBottom:2}}>Due</div>
              <div style={{fontFamily:CIN,fontSize:'0.7rem',color:totA-totR>0?red:green}}>{R(totA-totR)}</div>
            </div>
          </div>
          <div style={{height:3,background:'rgba(255,255,255,0.07)',borderRadius:2,marginBottom:10}}>
            <div style={{height:3,width:`${Math.min(pct,100)}%`,background:pct>=100?green:pct>=60?yellow:red,borderRadius:2}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.69rem',color:muted}}>
            <span>{cl.mobile}</span>
            {nextH?<span>Next hearing: {D(nextH.next)}</span>:<span style={{color:green}}>No upcoming hearings</span>}
          </div>
        </div>;
      })}
    </div>
  </div>;
}

        {allPay.length===0&&<div style={{padding:'24px',textAlign:'center',color:muted,fontSize:'0.85rem'}}>No payments recorded yet</div>}
        {allPay.map((p,i)=>(
          <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 1.4fr 1fr 1fr 1.5fr',padding:'10px 17px',borderBottom:'1px solid rgba(201,164,68,0.07)',alignItems:'center'}}>
            <div style={{fontSize:'0.76rem',color:cream}}>{D(p.date)}</div>
            <div style={{fontSize:'0.69rem',color:muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.caseTitle}</div>
            <div style={{fontFamily:CIN,fontSize:'0.74rem',color:green}}>{R(p.amt)}</div>
            <Badge col={blue} small ch={p.method}/>
            <div style={{fontSize:'0.72rem',color:muted}}>{p.note}</div>
          </div>
        ))}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1.4fr 1fr 1fr 1.5fr',padding:'10px 17px',background:'rgba(201,164,68,0.05)'}}>
          <div style={{fontFamily:CIN,fontSize:'0.54rem',letterSpacing:'0.12em',textTransform:'uppercase',color:muted,gridColumn:'1/3'}}>Total Received</div>
          <div style={{fontFamily:CIN,fontSize:'0.78rem',color:gold}}>{R(totR)}</div>
          <div/><div/>
        </div>
      </div>
    </div>}
  </div>;
}

/* ── ROOT APP — mobile state fully in React ── */
function App(){
  const [authed,setAuthed]=useState(false);
  const [view,setView]=useState('dashboard');
  const [detail,setDetail]=useState(null);
  const [mob,setMob]=useState(false);
  const [prevView,setPrevView]=useState('dashboard');
  const [cases]=useState(()=>{
    try{const s=localStorage.getItem('mla_cases');return s?JSON.parse(s):SEED;}
    catch(e){return SEED;}
  });
  useEffect(()=>{try{localStorage.setItem('mla_cases',JSON.stringify(cases));}catch(e){};},[cases]);
  useEffect(()=>{if(authed){autoWaReminder(cases);}},[authed]);
  const nav=v=>{if(v==='case-detail')setPrevView(view);setView(v);setMob(false);};
  if(!authed)return <Login onLogin={()=>setAuthed(true)}/>;
  const V=view==='case-detail'&&detail?'case-detail':view;
  return <div style={{display:'flex',width:'100%',height:'100%',overflow:'hidden',position:'relative'}}>
    {/* Mobile hamburger — pure React */}
    <button onClick={()=>setMob(v=>!v)} style={{display:'none',position:'fixed',top:13,left:13,zIndex:200,background:bg2,border:`1px solid ${bdr}`,color:gold,padding:'8px 10px',fontSize:'17px',lineHeight:1}} className="mob-show">☰</button>
    <Sidebar view={V} onNav={nav} onLogout={()=>{setAuthed(false);setView('dashboard');}} mob={mob} setMob={setMob}/>
    <div style={{flex:1,overflowY:'auto',background:bg,paddingTop:0}}>
      {V==='dashboard'&&<Dashboard cases={cases} onNav={nav} setDetail={setDetail}/>}
      {V==='cases'&&<CasesList cases={cases} onNav={nav} setDetail={setDetail}/>}
      {V==='case-detail'&&detail&&<CaseDetail c={detail} onBack={()=>setView(prevView==='clients'?'clients':'cases')}/>}
      {V==='diary'&&<DiaryView cases={cases}/>}
      {V==='finance'&&<FinanceView cases={cases}/>}
      {V==='reminders'&&<RemindersView cases={cases}/>}
      {V==='clients'&&<ClientsView cases={cases} onNav={nav} setDetail={setDetail} setPrevView={setPrevView} curView={view}/>}
      {V==='search'&&<SearchView cases={cases} onNav={nav} setDetail={setDetail}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
